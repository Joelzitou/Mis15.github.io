    <!--MODAL-->
    <div id="modal" class="modal" onclick="closeModal(event)">
        <!-- Botón de cerrar -->
        <span class="close" onclick="closeModal(event)">&times;</span>
        <!-- Imagen que se amplía -->
        <img id="modalImg" src="" alt="Imagen ampliada">
        <!-- Botones de zoom -->
        <button class="zoom-btn zoom-in" onclick="zoomIn()">+</button>
        <button class="zoom-btn zoom-out" onclick="zoomOut()">-</button>
        <!-- Flechas para navegar entre las imágenes -->
        <span class="prev" onclick="changeImage(-1); event.stopPropagation()">&#10094;</span>
        <span class="next" onclick="changeImage(1); event.stopPropagation()">&#10095;</span>
    </div>
    <script>
        window.addEventListener('load', function() {
            var audio = document.getElementById('background-music');
            audio.play();
        });
    </script>
